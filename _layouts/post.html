<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>{{ page.title }} - YashiTea</title>
    <meta name="description" content="{{ page.description }}">
    <style>
        body { font-family: Georgia, serif; max-width: 800px; margin: 0 auto; padding: 20px; line-height: 1.6; color: #333; }
        h1 { color: #8B4513; }
        h2 { color: #A0522D; margin-top: 2em; }
        img { max-width: 100%; height: auto; }
        .meta { color: #888; font-size: 0.9em; }
        .canonical { background: #f9f9f9; padding: 10px; border-left: 3px solid #8B4513; margin: 1em 0; }
    </style>
</head>
<body>
    <h1>{{ page.title }}</h1>
    <div class="meta">By {{ page.author }} | {{ page.date | date: "%B %d, %Y" }}</div>
    <div class="canonical">Originally published on <a href="{{ page.canonical_url }}">YashiTea.com</a></div>
    {{ content }}
</body>
</html>
